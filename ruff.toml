preview = true
line-length = 180

[lint]
select = [
   "ALL"
]
ignore = [
   "CPY",     # ignore missing-copyright-notice
   "DOC",     # ignore pydoclint, still lints docstrings according to pydocstyle
   "RET504",  # ignore assigning right before returning
   "T20",     # ignore print statements
]

[lint.pylint]
max-locals = 15
max-args = 5

[lint.pydocstyle]
convention = "pep257"